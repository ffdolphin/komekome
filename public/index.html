<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rice Tracker Premium | お米価格追跡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFAB40;
            --primary-dark: #FF9100;
            --accent: #FF6D00;
            --bg: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1E293B, #0F172A);
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin-bottom: 50px;
        }

        .price-input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: var(--glass);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .price-input-container label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .currency {
            position: absolute;
            left: 20px;
            color: var(--primary);
            font-weight: 600;
            font-size: 1.2rem;
        }

        #priceLimit {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 12px 20px 12px 40px;
            font-size: 1.4rem;
            font-family: 'Outfit', sans-serif;
            width: 180px;
            text-align: center;
            transition: all 0.3s;
        }

        #priceLimit:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(255, 171, 64, 0.2);
        }

        #priceLimit::-webkit-inner-spin-button {
            opacity: 0.5;
            cursor: pointer;
        }

        #trackBtn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(255, 109, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #trackBtn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 109, 0, 0.4);
        }

        #trackBtn:disabled {
            filter: grayscale(1);
            cursor: wait;
            opacity: 0.7;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            display: none;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            animation: fadeInUp 0.8s ease-out;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #fff;
            padding: 10px;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-site {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-price-info {
            margin-top: auto;
            border-top: 1px solid var(--glass-border);
            padding-top: 15px;
        }

        .card-total {
            font-size: 1.8rem;
            font-weight: 600;
            color: #fff;
        }

        .card-total span { font-size: 1rem; margin-right: 2px; }

        .card-breakdown {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card-link {
            display: block;
            text-align: center;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: #fff;
            text-decoration: none;
            padding: 12px;
            margin-top: 15px;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .card-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 0;
            color: var(--text-muted);
        }

        .empty-state h3 { font-size: 1.5rem; margin-bottom: 10px; color: var(--text); }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Rice Tracker Premium</h1>
            <p class="subtitle" id="subtitle">Amazon & ヨドバシカメラから「米 5kg」の最安値（送料込<span id="limitLabel">3400</span>円以下）を自動抽出します。</p>
            
            <div class="controls">
                <div class="price-input-container">
                    <label for="priceLimit">価格上限 (送料込):</label>
                    <div class="input-wrapper">
                        <span class="currency">¥</span>
                        <input type="number" id="priceLimit" value="3400" step="100" min="0">
                    </div>
                </div>

                <button id="trackBtn">
                    <span class="loader" id="loader"></span>
                    <span id="btnText">価格をチェックする</span>
                </button>
            </div>
        </header>

        <main id="results" class="results-grid">
            <div class="empty-state">
                <h3>準備はよろしいですか？</h3>
                <p>ボタンを押すと、最新の価格情報をリアルタイムで取得します。</p>
            </div>
        </main>
    </div>

    <script>
        const trackBtn = document.getElementById('trackBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const resultsGrid = document.getElementById('results');
        const priceLimitInput = document.getElementById('priceLimit');
        const limitLabel = document.getElementById('limitLabel');

        // Update label when input changes
        priceLimitInput.addEventListener('input', () => {
            limitLabel.innerText = priceLimitInput.value || 0;
        });

        trackBtn.addEventListener('click', async () => {
            const limit = priceLimitInput.value || 3400;

            // UI State
            trackBtn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'お米を探しています...';
            resultsGrid.innerHTML = '<div class="empty-state"><h3>Searching...</h3><p>ブラウザでAmazonとヨドバシを巡回中です。10〜20秒ほどお待ちください。</p></div>';

            try {
                const response = await fetch(`/api/track?limit=${limit}`);
                const data = await response.json();

                renderResults(data, limit);
            } catch (error) {
                resultsGrid.innerHTML = `<div class="empty-state"><h3>Error</h3><p>データの取得に失敗しました。サーバーが起動しているか確認してください。</p></div>`;
            } finally {
                trackBtn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = '価格をチェックする';
            }
        });

        function renderResults(data, limit) {
            if (!data || data.length === 0) {
                resultsGrid.innerHTML = `
                    <div class="empty-state">
                        <h3>現在、条件に合うお米はありません</h3>
                        <p>${limit}円以下の商品は見つかりませんでした。また後で確認してください。</p>
                    </div>`;
                return;
            }

            resultsGrid.innerHTML = data.map(item => `
                <div class="card">
                    <img src="${item.imgSrc}" alt="${item.title}" class="card-img" onerror="this.src='https://placehold.jp/200x200.png?text=No Image'">
                    <div class="card-body">
                        <div class="card-site">${item.site}</div>
                        <div class="card-title">${item.title}</div>
                        <div class="card-price-info">
                            <div class="card-total"><span>¥</span>${item.totalPrice.toLocaleString()}</div>
                            <div class="card-breakdown">
                                本体: ¥${item.price.toLocaleString()} + 送料: ¥${item.shipping.toLocaleString()}
                            </div>
                        </div>
                        <a href="${item.url}" target="_blank" class="card-link">商品ページを見る</a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
